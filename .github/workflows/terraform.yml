name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

jobs:
  terraform:
    name: fmt / validate / plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt (check only)
        run: terraform fmt -check -recursive ../../

      - name: Terraform init (no backend, plan-only review)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        # No real AWS credentials are configured for this assessment repo, so
        # the plan is generated against mock/placeholder credentials and is
        # expected to fail at the AWS API-call stage in CI, but fmt/init/
        # validate above already prove the code is well-formed and internally
        # consistent. With real credentials configured as repo secrets
        # (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION), this step
        # produces a full plan.
        run: terraform plan -refresh=false -var-file=${{ matrix.env }}.tfvars -no-color | tee plan_output.txt
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Upload plan as artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.env }}
          path: infra/envs/${{ matrix.env }}/plan_output.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'infra/envs/${{ matrix.env }}/plan_output.txt';
            const output = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '(no plan output)';
            const truncated = output.length > 60000 ? output.slice(0, 60000) + '\n... (truncated)' : output;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan — \`${{ matrix.env }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });
